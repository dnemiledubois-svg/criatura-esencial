<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bestiario Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Marcellus&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:'Unbounded';
  overflow:hidden;
}

/* CANVAS */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-2;
}

/* OVERLAY */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:radial-gradient(circle,rgba(0,0,0,.2),#000 80%);
  z-index:-1;
}

/* MARCA */
.brand{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  font-family:'Cinzel';
  font-size:3.5rem; /* antes ~1.8rem */
  letter-spacing:4px;
  font-weight:300;
  opacity:0.85;
  z-index:10;
  pointer-events:none;
}

/* CONTENIDO */
.container{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;

  
}

.text-block{
  transform:translateY(220px); /* 👈 AJUSTA AQUÍ */
}
h1{
  font-weight:300;
  font-size:1.6rem; /* antes ~2.5rem */
  opacity:0;
  transform:translateY(20px);
  animation:fadeUp 2s forwards;
}

p{
  opacity:.6;
  margin-top:10px;
}

button{
  margin-top:30px;
  padding:12px 24px;
  background:transparent;
  border:1px solid #fff;
  color:#fff;
  cursor:pointer;
  transition:.3s;
}

button:hover{
  background:#fff;
  color:#000;
  transform:scale(1.05);
}

@keyframes fadeUp{
  to{opacity:1;transform:translateY(0)}
}
</style>
</head>

<body>

<!-- MARCA -->
<div class="brand">Bestiario Lab</div>

<!-- OVERLAY -->
<div class="overlay"></div>

<!-- CONTENIDO -->
<div class="container">
  <div class="text-block">
    <h1>Tu proyecto ya existe.</h1>
    <p>Solo necesita manifestarse.</p>
    <button onclick="window.open('https://instagram.com/bestiariolab', '_blank')">
  Crear Criaturas
</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// SCENE
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);

const renderer = new THREE.WebGLRenderer({ alpha:true, antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);

document.body.appendChild(renderer.domElement);

camera.position.z = 3;

// REFERENCIA MARCA
const brand = document.querySelector('.brand');

// CARGA TEXTURA
const loader = new THREE.TextureLoader();

loader.load(
  'logo.png',

  function(texture){

    texture.encoding = THREE.sRGBEncoding;

    const material = new THREE.MeshBasicMaterial({
      map: texture,
      transparent: true
    });

    const geometry = new THREE.PlaneGeometry(3, 2);
    const mesh = new THREE.Mesh(geometry, material);

    scene.add(mesh);

    // ANIMACIÓN
    function animate(time){
      requestAnimationFrame(animate);

      // respiración
      const scale = 1 + Math.sin(time * 0.001) * 0.02;
      mesh.scale.set(scale, scale, scale);

      // profundidad
      mesh.position.z = Math.sin(time * 0.001) * 0.2;

      // animación marca
      brand.style.transform =
        `translateX(-50%) scale(${1 + Math.sin(time*0.001)*0.01})`;

      renderer.render(scene, camera);
    }

    requestAnimationFrame(animate);

    // INTERACCIÓN (mirada viva)
    window.addEventListener('mousemove', (e)=>{
      const x = (e.clientX / window.innerWidth - 0.5);
      const y = (e.clientY / window.innerHeight - 0.5);

      mesh.position.x = x * 0.2;
      mesh.position.y = -y * 0.2;

      mesh.rotation.x = y * 0.15;
    });

  },

  undefined,

  function(error){
    console.error('Error cargando logo:', error);
  }
);

// RESPONSIVE
window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
