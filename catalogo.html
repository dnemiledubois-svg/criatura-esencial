<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo - Bestiario Lab</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:'Unbounded';
  text-align:center;
}

h1{
  margin-top:40px;
}

.grid{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  padding:40px;
}

.item{
  width:150px;
  cursor:pointer;
  transition:.3s;
}

.item:hover{
  transform:scale(1.1);
}

.item img{
  width:100%;
  border-radius:10px;
}
</style>
</head>

<body>

<h1>Catálogo</h1>

<div class="grid" id="grid"></div>

  <div class="item" onclick="window.open('https://tuproyecto1.com')">
    <img src="trabajo1.jpg">
    <p>Proyecto 1</p>
  </div>

  <div class="item" onclick="window.open('https://tuproyecto2.com')">
    <img src="trabajo2.jpg">
    <p>Proyecto 2</p>
  </div>

</div>

<button onclick="window.location.href='index.html'">
  Volver
</button>

</body>
</html>
