<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo - Bestiario Lab</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:'Unbounded';
  text-align:center;
}

h1{
  margin-top:40px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns: repeat(4, 1fr);
  gap:30px;
  padding:40px;
  max-width:1000px;
  margin:0 auto;
}

/* ITEM */
.item{
  position:relative;
  overflow:hidden;
  cursor:pointer;
  border-radius:12px;
}

/* IMAGEN */
.item img{
  width:100%;
  display:block;
  transition: transform 0.6s ease, filter 0.6s ease;
  filter:brightness(0.8);
}

/* TEXTO OCULTO */
.item p{
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  opacity:0;
  font-size:0.9rem;
  letter-spacing:1px;
  transition:0.4s ease;
  text-shadow:0 0 8px rgba(0,0,0,0.8);
}

/* HOVER */
.item:hover img{
  transform:scale(1.1);
  filter:brightness(1.1) contrast(1.1);
}

.item:hover p{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

/* EFECTO "RESPIRACIÓN" */
.item::after{
  content:'';
  position:absolute;
  inset:0;
  background:radial-gradient(circle at center, rgba(255,255,255,0.08), transparent 70%);
  opacity:0;
  transition:0.5s;
}

.item:hover::after{
  opacity:1;
}

/* RESPONSIVE */
@media (max-width: 800px){
  .grid{
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (max-width: 500px){
  .grid{
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<h1>Catálogo</h1>

<div class="grid" id="grid">

  <div class="item" onclick="window.open('https://aneta.cl')">
    <img src="trabajo1.jpg">
    <p>ÁNETA</p>
  </div>

  <div class="item" onclick="window.open('https://tuproyecto2.com')">
    <img src="trabajo2.jpg">
    <p>Proyecto 2</p>
  </div>

</div>
<button onclick="window.location.href='index.html'">
  Volver
</button>
<script>
const items = document.querySelectorAll('.item');

items.forEach((item, i) => {
  let t = 0;

  function animate(){
    t += 0.01;

    const offset = Math.sin(t + i) * 2;
    item.style.transform = `translateY(${offset}px)`;

    requestAnimationFrame(animate);
  }

  animate();
});
</script>
</body>
</html>
